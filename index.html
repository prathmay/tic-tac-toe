<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>Tic Tac Toe</title>
</head>

<body>
    <h1>Tic Tac Toe</h1>

    <div class="buttons">
        <div class="dropdown">
            <button class="button1" id="button1" type="button">Vs Bot</button>
            <div id="levels" class="dropdown-menu">
                <button class="level-option" type="button" data-level="1">Easy</button>
                <button class="level-option" type="button" data-level="2">Medium</button>
                <button class="level-option" type="button" data-level="3">Impossible !</button>
            </div>
        </div>
        <button class="button2" id="button2" type="button">Vs Player</button>
    </div>

    <div class="play-area">
        <table id="board">
            <tr>
                <td id="1"></td>
                <td id="2"></td>
                <td id="3"></td>
            </tr>
            <tr>
                <td id="4"></td>
                <td id="5"></td>
                <td id="6"></td>
            </tr>
            <tr>
                <td id="7"></td>
                <td id="8"></td>
                <td id="9"></td>
            </tr>
        </table>

        <div class="switch">
            <button class="button-x" id="button-x" type="button">X</button>
            <button class="button-o" id="button-o" type="button">O</button>
        </div>
    </div>

    <div class="restart">
        <button class="button3" id="button3" type="button">Restart</button>
    </div>

    <script src="index.js" type="text/javascript"></script>
</body>

</html>
